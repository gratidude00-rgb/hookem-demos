<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HookEm — Demo Sites</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0a0e16; color: #e6e9ef; padding: 60px 24px; min-height: 100vh; }
    .wrap { max-width: 980px; margin: 0 auto; }
    h1 { font-size: 32px; font-weight: 600; margin-bottom: 8px; }
    h1::before { content: ""; display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #4fa3d4; margin-right: 12px; vertical-align: middle; box-shadow: 0 0 16px #4fa3d4; }
    p.lead { color: #7e8699; font-size: 15px; margin-bottom: 40px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }
    .card { background: #131a2a; border: 1px solid #1e2638; border-radius: 12px; padding: 22px; color: #e6e9ef; text-decoration: none; transition: all 0.15s; display: block; }
    .card:hover { border-color: #4fa3d4; transform: translateY(-2px); }
    .card h3 { font-size: 17px; font-weight: 500; margin-bottom: 8px; }
    .cta { font-size: 12px; color: #4fa3d4; letter-spacing: 1px; text-transform: uppercase; }
    footer { margin-top: 60px; color: #5b6378; font-size: 12px; text-align: center; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>HookEm Demos</h1>
    <p class="lead">Free preview websites for Cretan small businesses. 2 demos live.</p>
    <div class="grid">
    <a class="card" href="areston-taverna/"><h3>Areston Taverna</h3><p class="cta">View demo →</p></a>
    <a class="card" href="taverna-harakas/"><h3>Taverna Harakas</h3><p class="cta">View demo →</p></a>
    </div>
    <footer>HookEm — Hersonissos pilot</footer>
  </div>
</body>
</html>
